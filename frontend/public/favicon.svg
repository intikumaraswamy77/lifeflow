<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e60000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad2">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Modern rounded square background -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#grad1)"/>
  
  <!-- Subtle overlay for depth -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#grad2)"/>
  
  <!-- Stylized heart pulse design -->
  <g transform="translate(50, 50)">
    <!-- Heart shape -->
    <path d="M 0,-8 
             L -5,-13 
             C -8,-16, -12,-16, -14,-13
             C -16,-10, -16,-6, -14,-3
             L 0,10
             L 14,-3
             C 16,-6, 16,-10, 14,-13
             C 12,-16, 8,-16, 5,-13
             L 0,-8 Z" 
          fill="white" 
          transform="scale(1.8)"/>
    
    <!-- Pulse line across heart -->
    <path d="M -20,0 L -10,0 L -5,-10 L 0,10 L 5,-5 L 10,0 L 20,0" 
          fill="none" 
          stroke="#ff3b3b" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>
